# 文书审核管理系统 - Nginx 配置
# 使用方式: cp nginx.conf /etc/nginx/sites-available/doc-review
#          ln -s /etc/nginx/sites-available/doc-review /etc/nginx/sites-enabled/
#          nginx -t && nginx -s reload

server {
    listen 8080;
    server_name _;  # 替换为你的域名或IP

    # 管理后台静态文件
    root /home/root/admin/dist;      # 替换为实际路径
    index index.html;

    # SPA fallback — Vue Router history 模式必须
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 上传文件大小限制
        client_max_body_size 100m;
    }

    # 上传文件访问
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # gzip 静态资源
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }
}

server {                                                                                                              
    listen 1000;                                                                                                      
    server_name _;                                                                                                    
                                                                                                                    
    root /home/root/h5;             # ✅ 加 /                                                                         
    index index.html;                                                                                                 
                                                                                                                    
    location /assets/ {                                                                                               
        expires 1y;                                                                                                   
        add_header Cache-Control "public, immutable";                                                                 
    }                                                                                                                 
                                                                                                                    
    location / {                                                                                                      
        try_files $uri $uri/ /index.html;   # ✅ SPA fallback                                                         
    }                                                                                                                 
                                                                                                                    
    location /api/ {                        # ✅ API 反代                                                             
        proxy_pass http://127.0.0.1:3000;                                                                             
        proxy_set_header Host $host;                                                                                  
        proxy_set_header X-Real-IP $remote_addr;                                                                      
        client_max_body_size 100m;           # ✅ 注意拼写: client_max_body_size                                      
    }                                                                                                                 
}